# fail2ban filter for web vulnerability scanners.
# Matches Caddy JSON log format. Ban on first match.

[Definition]
failregex = "client_ip":"<HOST>".*"uri":"/(\.env|wp-login|wp-admin|phpMyAdmin|phpmyadmin|admin|xmlrpc\.php|\.git|cgi-bin|shell|eval-stdin|actuator|boaform|solr|vendor|telescope|debug|console|manager|jenkins|\.aws|config\.json|\.DS_Store|wp-content|wp-includes|administrator|magento|struts|jmx-console|invoker)
            "client_ip":"<HOST>".*"uri":"[^"]*\.(php|asp|aspx|jsp|cgi|bak|sql)

ignoreregex =

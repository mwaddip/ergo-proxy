# fail2ban jail for ergo-proxy-node
# Install:
#   sudo cp ergo-proxy.conf /etc/fail2ban/filter.d/
#   sudo cp ergo-proxy-jail.conf /etc/fail2ban/jail.d/
#   sudo systemctl restart fail2ban

[ergo-proxy]
enabled = true
filter = ergo-proxy
logpath = /tmp/ergo-proxy.log
# 5 violations within 10 minutes = 1 hour ban
maxretry = 5
findtime = 600
bantime = 3600

# fail2ban filter for ergo-proxy-node
# Matches F2B_* tagged log lines with an IP address
#
# Log format (tracing default):
#   2026-03-31T00:01:11.444Z  WARN ergo_proxy_node: F2B_REJECT connection limit exceeded ip=1.2.3.4
#   2026-03-31T00:01:11.444Z  WARN ergo_proxy_node: F2B_HANDSHAKE_FAIL bad handshake ip=1.2.3.4

[Definition]

# Match any F2B_ tagged line with an ip= field
failregex = F2B_\w+ .* ip=<HOST>

ignoreregex =
